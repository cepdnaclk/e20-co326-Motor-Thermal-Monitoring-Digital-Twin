# ──────────────────────────────────────────────────────────────────────────────
# Mosquitto broker configuration
# Security note: allow_anonymous is TRUE in this merged setup.
#   - Original docker/ stack used password auth (allow_anonymous false).
#   - The Edge AI Python containers (python-device, python-edge) do not carry
#     credentials, so password auth would reject them.
#   - The lecturer's spec does not require broker-level auth.
#   - Decision: anonymous access enabled for simplicity.
#     To re-enable auth, set allow_anonymous false, uncomment password_file,
#     and generate a passwd file using: mosquitto_passwd -c config/passwd <user>
# ──────────────────────────────────────────────────────────────────────────────

listener 1883
allow_anonymous true

# Uncomment below to re-enable password auth:
# allow_anonymous false
# password_file /mosquitto/config/passwd

log_type all
log_dest stdout

persistence true
persistence_location /mosquitto/data/
